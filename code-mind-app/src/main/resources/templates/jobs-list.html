<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>CodeMind</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div th:replace="~{fragments :: topnav('jobs', ${recentJobId})}"></div>

<div class="container">
    <div class="grid">
        <div class="panel">
            <h2>Start New Job</h2>
            <div class="error-banner" th:if="${error}" th:text="${error}"></div>
            <form method="post" th:action="@{/ui/jobs}">
                <label for="repositoryPath">Repository path</label>
                <input id="repositoryPath" type="text" name="repositoryPath" placeholder="/path/to/repo" required/>

                <label for="outputDirectory">Output directory (optional)</label>
                <input id="outputDirectory" type="text" name="outputDirectory" placeholder="defaults to ./output/&lt;job-id&gt;"/>

                <label for="maxConcurrency">Max concurrency (optional)</label>
                <input id="maxConcurrency" type="number" min="1" name="maxConcurrency" placeholder="defaults to configured value"/>

                <label for="executionMode">Execution mode (optional)</label>
                <select id="executionMode" name="executionMode">
                    <option value="">Default</option>
                    <option value="SYNC">SYNC</option>
                    <option value="BATCH">BATCH</option>
                </select>

                <button type="submit" class="btn-primary">Start Extraction</button>
            </form>
        </div>

        <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <h2 style="margin:0">Jobs</h2>
                <button th:unless="${#lists.isEmpty(jobs)}" onclick="clearAllData()" class="btn-danger">Clear All Data</button>
            </div>
            <p class="empty-state" th:if="${#lists.isEmpty(jobs)}">No jobs started yet — use the form to kick one off.</p>
            <table th:unless="${#lists.isEmpty(jobs)}">
                <thead>
                <tr>
                    <th>Job</th>
                    <th>Phase</th>
                    <th>Files</th>
                    <th>Mode</th>
                    <th>Started</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <td class="mono" th:text="${job.jobId.substring(0, 8)}"></td>
                    <td><span class="badge" th:class="|badge badge-${job.phase}|" th:text="${job.phase}"></span></td>
                    <td th:text="${job.processedFiles} + ' / ' + ${job.totalFiles}"></td>
                    <td>
                        <span th:text="${job.executionMode}"></span>
                        <span th:if="${job.incremental}" class="badge badge-INCREMENTAL">Incremental</span>
                    </td>
                    <td class="mono" th:text="${#temporals.format(job.createdAt, 'MMM d, HH:mm:ss')}"></td>
                    <td>
                        <a th:href="@{/ui/jobs/{id}(id=${job.jobId})}">Progress</a>
                        &nbsp;&middot;&nbsp;
                        <a th:href="@{/ui/jobs/{id}/ask(id=${job.jobId})}">Ask</a>
                        &nbsp;&middot;&nbsp;
                        <a href="#" th:attr="data-job-id=${job.jobId}" onclick="deleteJob(this.dataset.jobId)" class="link-danger">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="app-footer">
    <span>CodeMind</span><span class="dot-sep">&middot;</span><span>Spring AI + Claude</span>
</footer>

<script>
function clearAllData() {
    if (!confirm('Delete ALL jobs, output files, and cached data?\n\nThis cannot be undone.')) return;
    fetch('/api/v1/extraction-jobs', { method: 'DELETE' })
        .then(() => location.reload())
        .catch(err => alert('Clear failed: ' + err));
}
function deleteJob(jobId) {
    if (!confirm('Delete this job and all its output files?')) return;
    fetch('/api/v1/extraction-jobs/' + jobId, { method: 'DELETE' })
        .then(() => location.reload())
        .catch(err => alert('Delete failed: ' + err));
}
</script>
</body>
</html>
