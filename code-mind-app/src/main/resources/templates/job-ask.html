<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="context-path" th:content="@{/}"/>
    <title>Ask &middot; CodeMind</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script th:src="@{/js/context.js}"></script>
</head>
<body th:attr="data-job-id=${job.jobId}">
<div th:replace="~{fragments :: topnav('ask', ${job.jobId})}"></div>

<div class="container">
    <div class="tabs">
        <a th:href="@{/ui/jobs/{id}(id=${job.jobId})}">Progress</a>
        <a class="active" th:href="@{/ui/jobs/{id}/ask(id=${job.jobId})}">Ask</a>
    </div>

    <div class="panel">
        <h2>Ask About This Codebase's Logic</h2>
        <p class="muted" style="margin-top:0">
            Questions are answered by retrieving the extracted-logic summaries that best match your
            question (vector search when available, falling back to keyword overlap) and asking an LLM
            to answer using only that context.
        </p>

        <div class="chat-log" id="chat-log"></div>

        <form id="ask-form" class="ask-form">
            <input id="question-input" type="text" placeholder="e.g. how does the checkout flow validate payment?" autocomplete="off" required/>
            <button type="submit">Ask</button>
        </form>
    </div>
</div>

<footer class="app-footer">
    <span>CodeMind</span><span class="dot-sep">&middot;</span><span>Spring AI + Claude</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/job-ask.js}"></script>
</body>
</html>
