<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="context-path" th:content="@{/}"/>
    <title>Ask All &middot; CodeMind</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script th:src="@{/js/context.js}"></script>
</head>
<body>
<div th:replace="~{fragments :: topnav('ask-global', null)}"></div>

<div class="container">
    <div class="panel">
        <h2>Ask All Codebases</h2>
        <p class="muted" style="margin-top:0">
            Questions are answered by searching across all completed extraction jobs at once.
        </p>

        <div th:if="${#lists.isEmpty(jobs)}" class="empty-state" style="margin-bottom:16px">
            No completed jobs to search yet.
            <a th:href="@{/ui/jobs}">Start an extraction job</a> first.
        </div>

        <div th:unless="${#lists.isEmpty(jobs)}" class="global-ask-jobs" id="jobs-context">
            <span class="rule-label">Searching across</span>
            <div class="dep-chips" style="margin-top:6px">
                <span th:each="job : ${jobs}" class="dep-chip"
                      th:text="${job.jobId.substring(0,8)} + ' · ' + ${job.repositoryRoot}"></span>
            </div>
        </div>

        <div class="chat-log" id="chat-log"></div>

        <form id="ask-form" class="ask-form" th:if="${not #lists.isEmpty(jobs)}">
            <input id="question-input" type="text" placeholder="e.g. how is authentication handled across services?" autocomplete="off" required/>
            <button type="submit">Ask</button>
        </form>
    </div>
</div>

<footer class="app-footer">
    <span>CodeMind</span><span class="dot-sep">&middot;</span><span>Spring AI + Claude</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/ask-global.js}"></script>
</body>
</html>
