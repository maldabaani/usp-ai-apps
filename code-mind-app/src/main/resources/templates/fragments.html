<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  topnav(activePage, askJobId)
    activePage : 'execution' | 'ask' | 'jobs'
    askJobId   : String job UUID for the Ask Agent link, or null to disable it
-->
<div th:fragment="topnav(activePage, askJobId)" class="topbar">
    <div class="brand">
        <a th:href="@{/ui/jobs}">
            <span class="brand-mark" aria-hidden="true">CM</span>Code<span>Mind</span>
        </a>
    </div>
    <nav class="topnav">
        <a th:href="@{/ui/jobs}"
           th:class="${activePage == 'execution'} ? 'topnav-link active' : 'topnav-link'">
            Job Execution
        </a>
        <a th:href="${askJobId != null} ? @{/ui/jobs/{id}/ask(id=${askJobId})} : @{/ui/jobs}"
           th:class="${activePage == 'ask'} ? 'topnav-link active' : 'topnav-link'">
            Ask
        </a>
        <a th:href="@{/ui/ask}"
           th:class="${activePage == 'ask-global'} ? 'topnav-link active' : 'topnav-link'">
            Ask All
        </a>
    </nav>
</div>

</body>
</html>
