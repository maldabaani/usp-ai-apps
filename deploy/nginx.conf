server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CodeMind's SSE endpoints (Ask / Ask All), served by the unified
    # StoryForge backend (see api/routers/codemind_ask.py) — buffering must
    # stay off so the stream is forwarded chunk by chunk instead of being
    # held until it ends. Placed ahead of the general /api/ block below
    # since nginx matches the most specific (longest) prefix/regex location
    # first.
    location ~ ^/api/v1/(extraction-jobs/[^/]+/qa/stream|ask/stream)$ {
        proxy_pass http://storyforge-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # StoryForge AI backend (also serves CodeMind's /api/v1/extraction-jobs*
    # endpoints, see api/routers/codemind_jobs.py -- the standalone
    # code-mind-app Java service has been retired, see Phase F8)
    location /api/ {
        proxy_pass http://storyforge-backend:8000/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA (catch-all, must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
