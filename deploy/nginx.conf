server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CodeMind SSE endpoints, now also served by the unified StoryForge
    # backend (see api/routers/codemind_ask.py) — buffering must stay off so
    # the stream is forwarded chunk by chunk instead of being held until it
    # ends. Placed ahead of the general /api/ block below since nginx
    # matches the most specific (longest) prefix/regex location first.
    location ~ ^/api/v1/(extraction-jobs/[^/]+/qa/stream|ask/stream)$ {
        proxy_pass http://storyforge-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # StoryForge AI backend (also serves CodeMind's non-streaming
    # /api/v1/extraction-jobs* endpoints, see api/routers/codemind_jobs.py)
    location /api/ {
        proxy_pass http://storyforge-backend:8000/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The still-running Java CodeMind app's own SSE endpoints (its Thymeleaf
    # UI, reached via the Angular shell's iframe, calls these directly under
    # its own /codemind-app context-path -- not yet retired; see Phase F8).
    # Same buffering-off requirement as the block above, different upstream.
    location ~ ^/codemind-app/api/v1/(extraction-jobs/[^/]+/qa/stream|ask/stream)$ {
        proxy_pass http://codemind:8085;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CodeMind (Spring Boot, context-path=/codemind-app). No trailing slash on
    # the proxy_pass target — nginx must forward the full /codemind-app/... URI
    # unchanged so it matches Spring's context-path on the wire.
    location /codemind-app/ {
        proxy_pass http://codemind:8085;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA (catch-all, must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
