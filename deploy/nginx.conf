server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # StoryForge AI backend
    location /api/ {
        proxy_pass http://storyforge-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CodeMind SSE endpoints (Ask / Ask All) — buffering must stay off so the
    # stream is forwarded chunk by chunk instead of being held until it ends.
    # Placed ahead of the general /codemind-app/ block below since nginx
    # matches the most specific (longest) prefix/regex location first.
    location ~ ^/codemind-app/api/v1/(extraction-jobs/[^/]+/qa/stream|ask/stream)$ {
        proxy_pass http://codemind:8085;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CodeMind (Spring Boot, context-path=/codemind-app). No trailing slash on
    # the proxy_pass target — nginx must forward the full /codemind-app/... URI
    # unchanged so it matches Spring's context-path on the wire.
    location /codemind-app/ {
        proxy_pass http://codemind:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA (catch-all, must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
