<header class="sf-header">
  <a routerLink="/" class="sf-brand">
    <svg class="sf-brand-icon" viewBox="0 0 100 100" width="24" height="24" aria-hidden="true">
      <rect x="16" y="16" width="52" height="52" rx="15" fill="#C85A26" opacity="0.94"/>
      <rect x="32" y="32" width="52" height="52" rx="15" fill="#35688F" opacity="0.94" style="mix-blend-mode:multiply"/>
    </svg>
    <span>Cognis AI</span>
  </a>
  <nav class="sf-header-nav" *ngIf="isAuthenticated">
    <a routerLink="/monitoring" routerLinkActive="sf-nav-active" class="sf-nav-link">Monitoring</a>
    <a routerLink="/settings" routerLinkActive="sf-nav-active" class="sf-nav-link">Settings</a>
    <span class="sf-nav-username">{{ username }}</span>
    <a class="sf-nav-link" (click)="logout()">Logout</a>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>
