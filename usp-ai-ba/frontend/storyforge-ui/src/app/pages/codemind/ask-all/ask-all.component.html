<div class="sf-page">
  <div class="sf-card">
    <h2>Ask All Codebases</h2>
    <p class="cm-muted">Questions are answered by searching across all completed extraction jobs at once.</p>

    <div *ngIf="!loading && !completedJobs.length" class="cm-empty">
      No completed jobs to search yet. <a routerLink="/codemind">Start an extraction job</a> first.
    </div>

    <div *ngIf="completedJobs.length" class="cm-jobs-context">
      <span class="cm-rule-label">Searching across</span>
      <div class="cm-dep-chips">
        <span class="cm-dep-chip" *ngFor="let job of completedJobs">
          {{ shortId(job.jobId) }} &middot; {{ job.repositoryRoot }}
        </span>
      </div>
    </div>

    <div class="cm-chat-log" #chatLog>
      <div
        *ngFor="let m of messages"
        class="cm-bubble"
        [ngClass]="'cm-bubble-' + m.role"
        [class.cm-bubble-pending]="m.pending"
      >
        {{ m.text }}
        <div class="cm-sources" *ngIf="m.sources?.length">
          <span class="cm-source-chip" *ngFor="let s of m.sources">{{ s }}</span>
        </div>
      </div>
    </div>

    <form class="cm-ask-form" *ngIf="completedJobs.length" (ngSubmit)="ask()">
      <input
        class="sf-input"
        type="text"
        [(ngModel)]="question"
        name="question"
        placeholder="e.g. how is authentication handled across services?"
        autocomplete="off"
        [disabled]="asking"
        required
      />
      <button type="submit" class="sf-btn" [disabled]="asking">Ask</button>
    </form>
  </div>
</div>
