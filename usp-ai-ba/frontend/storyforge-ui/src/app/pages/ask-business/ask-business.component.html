<div class="sf-page">
  <a routerLink="/" class="ask-back-link">&larr; Home</a>

  <div class="sf-card">
    <h2>Ask Business Questions</h2>
    <p class="ask-muted">
      Answers business-team questions using the same shared ingestion corpus as Ask Technical --
      described in plain business language, without file paths or implementation detail.
    </p>

    <div class="ask-empty" *ngIf="!statusLoading && status && !status.has_content">
      No content has been ingested yet. <a routerLink="/ingestion">Run ingestion</a> first.
    </div>

    <div class="ask-chat-log" #chatLog>
      <div
        *ngFor="let m of messages"
        class="ask-bubble"
        [ngClass]="'ask-bubble-' + m.role"
        [class.ask-bubble-pending]="m.pending"
      >
        {{ m.text }}
        <div class="ask-sources" *ngIf="m.sources?.length">
          <span class="ask-source-chip" *ngFor="let s of m.sources">{{ s }}</span>
        </div>
      </div>
    </div>

    <form class="ask-form" (ngSubmit)="ask()">
      <input
        class="sf-input"
        type="text"
        [(ngModel)]="question"
        name="question"
        placeholder="e.g. what does the login feature let customers do?"
        autocomplete="off"
        [disabled]="asking"
        required
      />
      <button type="submit" class="sf-btn" [disabled]="asking">Ask</button>
    </form>
  </div>
</div>
