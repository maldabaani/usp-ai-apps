<div class="sf-page">
  <h1>New Assessment</h1>

  <div class="sf-card">
    <div class="sf-field">
      <label for="ppmNumber">PPM #</label>
      <input id="ppmNumber" class="sf-input" type="text" [(ngModel)]="ppmNumber" placeholder="e.g. 331420" />
    </div>

    <div class="sf-field">
      <label for="ppmName">PPM Name</label>
      <input id="ppmName" class="sf-input" type="text" [(ngModel)]="ppmName" placeholder="e.g. Hassantuk Postpaid Enhancement" />
    </div>

    <div class="sf-field">
      <label for="systemName">System Name</label>
      <input id="systemName" class="sf-input" type="text" [(ngModel)]="systemName" placeholder="e.g. USP-Indirect" />
    </div>

    <div class="sf-field">
      <label>Solution Design Document (PDF)</label>
      <div
        class="sf-dropzone"
        [class.sf-dropzone-active]="isDragOver"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
      >
        <ng-container *ngIf="!selectedFile">
          <p>Drag and drop a PDF here, or</p>
          <label class="sf-btn sf-btn-secondary sf-file-label">
            Browse files
            <input type="file" accept="application/pdf" (change)="onFileSelected($event)" hidden />
          </label>
        </ng-container>
        <p *ngIf="selectedFile" class="sf-file-name">{{ selectedFile.name }}</p>
      </div>
    </div>

    <div class="sf-field">
      <label for="outputMode">Task Management System</label>
      <select id="outputMode" class="sf-select" [(ngModel)]="outputMode">
        <option value="document">Document (.docx export)</option>
        <option value="notion">Notion</option>
        <option value="ado">Azure DevOps</option>
      </select>
    </div>

    <div class="sf-field sf-toggle-field">
      <label class="sf-toggle">
        <input type="checkbox" [(ngModel)]="reviewMode" />
        <span>{{ reviewMode ? 'Review before creating tasks' : 'Auto-create tasks' }}</span>
      </label>
    </div>

    <p *ngIf="submitError" class="sf-error-text">{{ submitError }}</p>

    <button class="sf-btn" [disabled]="!canSubmit" (click)="runAssessment()">
      {{ submitting ? 'Submitting...' : 'Run Assessment' }}
    </button>
  </div>
</div>
