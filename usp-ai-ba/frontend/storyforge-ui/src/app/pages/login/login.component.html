<div class="sf-login-page">
  <div class="sf-card sf-login-card">
    <div class="sf-login-brand">
      <svg class="sf-brand-icon" viewBox="0 0 100 100" width="30" height="30" aria-hidden="true">
        <rect x="16" y="16" width="52" height="52" rx="15" fill="#C85A26" opacity="0.94"/>
        <rect x="32" y="32" width="52" height="52" rx="15" fill="#35688F" opacity="0.94" style="mix-blend-mode:multiply"/>
      </svg>
      <h1 class="sf-login-title">Cognis AI</h1>
    </div>
    <p class="sf-login-sub">Log in to continue</p>

    <div class="sf-field">
      <label for="username">Username</label>
      <input
        id="username"
        class="sf-input"
        type="text"
        [(ngModel)]="username"
        (keyup.enter)="login()"
        autocomplete="username"
      />
    </div>

    <div class="sf-field">
      <label for="password">Password</label>
      <input
        id="password"
        class="sf-input"
        type="password"
        [(ngModel)]="password"
        (keyup.enter)="login()"
        autocomplete="current-password"
      />
    </div>

    <p *ngIf="loginError" class="sf-error-text">{{ loginError }}</p>

    <button class="sf-btn sf-login-btn" [disabled]="!canSubmit" (click)="login()">
      {{ submitting ? 'Logging in...' : 'Log In' }}
    </button>
  </div>
</div>
