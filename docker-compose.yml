services:
  storyforge-backend:
    build:
      context: ./usp-ai-ba/backend
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      # Falls back to an auto-generated, persisted-under-/data secret if
      # left unset (see config.py's _default_jwt_secret()) -- fine for a
      # single-container deployment where nothing else needs to verify
      # tokens it issues.
      JWT_SECRET: ${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - storyforge-data:/data
    expose:
      - "8000"

  gateway:
    build:
      context: .
      dockerfile: deploy/gateway.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - storyforge-backend

volumes:
  storyforge-data:
